name: Cron dispatcher

on:
  schedule:
    - cron: '*/5 * * * *'   # GitHub Actions er master-klokka
  workflow_dispatch:         # manuell kjøring fra Actions-fanen

jobs:
  dispatch:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Dispatch due cron jobs
        env:
          APP_URL: ${{ secrets.APP_URL }}         # f.eks. https://resonans.vercel.app
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          node << 'EOF'
          const APP_URL    = process.env.APP_URL.replace(/\/$/, '');
          const SECRET     = process.env.CRON_SECRET;
          const HEADERS    = { Authorization: `Bearer ${SECRET}` };

          // ── Hent due-jobber fra appen ───────────────────────────────────────
          // All cron-matching + dedup mot cron_executions skjer server-side i
          // /api/cron/jobs?due=1 (se src/lib/server/cron-schedule.ts). Det gir
          // ett romslig oppslagsvindu slik at forsinkede dispatcher fortsatt
          // fanger daglige jobber, uten å dobbeltkjøre høyfrekvente jobber.
          async function main() {
            console.log(`Henter due-jobber fra ${APP_URL}/api/cron/jobs?due=1 …`);
            const listRes = await fetch(`${APP_URL}/api/cron/jobs?due=1`, { headers: HEADERS });
            if (!listRes.ok) {
              console.error(`Feil ved henting av jobbregister: ${listRes.status} ${await listRes.text()}`);
              process.exit(1);
            }

            const due = await listRes.json();
            console.log(`Nåværende tidspunkt (UTC): ${new Date().toISOString()}`);
            console.log(`Jobber som skal kjøre nå: ${due.length}`);

            // Kjør due-jobber parallelt
            const results = await Promise.allSettled(
              due.map(async job => {
                console.log(`  → Starter: ${job.path} (${job.schedule}) — ${job.description}`);
                const timeout = (job.maxDurationSeconds ?? 30) * 1000;
                const controller = new AbortController();
                const timer = setTimeout(() => controller.abort(), timeout);

                try {
                  const res = await fetch(`${APP_URL}${job.path}`, {
                    headers: HEADERS,
                    signal: controller.signal
                  });
                  const body = await res.text();
                  console.log(`  ✓ ${job.path} → ${res.status}: ${body.slice(0, 200)}`);
                  return { job: job.path, status: res.status };
                } catch (err) {
                  console.error(`  ✗ ${job.path} → ${err.message}`);
                  throw err;
                } finally {
                  clearTimeout(timer);
                }
              })
            );

            const failed = results.filter(r => r.status === 'rejected');
            if (failed.length > 0) {
              console.error(`${failed.length} jobb(er) feilet.`);
              process.exit(1);
            }

            console.log('Ferdig.');
          }

          main();
          EOF
